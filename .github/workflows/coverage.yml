name: coverage

on:
  pull_request:
  push:
    branches: [main]

jobs:
  coverage:
    name: code coverage → Coveralls
    runs-on: ubuntu-latest
    container: swift:5.10-jammy
    steps:
      - uses: actions/checkout@v4

      # The swift:jammy image is minimal and ships without curl, which the
      # Coveralls uploader action needs to fetch its reporter binary.
      - name: Install curl for the Coveralls uploader
        run: apt-get update && apt-get install -y --no-install-recommends curl ca-certificates

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Export lcov
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH="$(swift build --show-bin-path)"
          PROFDATA="$(find .build -name 'default.profdata' | head -n1)"
          XCTEST="$(find "$BIN_PATH" -name '*.xctest' -type f | head -n1)"
          echo "bin=$BIN_PATH profdata=$PROFDATA xctest=$XCTEST"
          llvm-cov export \
            -format=lcov \
            -instr-profile "$PROFDATA" \
            "$XCTEST" \
            -ignore-filename-regex='(Tests|\.build)/' \
            > coverage.lcov
          echo "lcov lines: $(wc -l < coverage.lcov)"

      # Regression gate: fail if line coverage drops below the floor. Set below
      # the current ~95% so it never false-fails; ratchet upward as coverage
      # rises. Line coverage is computed from the DA records in the lcov report
      # (a[2] is the hit count for each instrumented line).
      - name: Enforce coverage floor
        shell: bash
        run: |
          set -euo pipefail
          total=$(awk -F: '
            /^DA:/ { split($2, a, ","); t++; if (a[2]+0 > 0) c++ }
            END { printf "%.2f", (t ? 100*c/t : 0) }
          ' coverage.lcov)
          echo "Line coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 92) ? 0 : 1 }' || {
            echo "::error::coverage ${total}% is below the 92% floor"; exit 1;
          }

      # Publish the lcov so per-file coverage is auditable from CI without the
      # Coveralls UI (which posts no status/PR comment for this repo).
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
          format: lcov
