name: docs

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: true

jobs:
  docc:
    name: build & publish DocC HTML to gh-pages
    runs-on: ubuntu-24.04
    container: swift:5.10-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Generate DocC static site
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target AxiamSDK \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path axiam-swift-sdk \
            --output-path ./docs
      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DIR=docs
          touch "$DIR/.nojekyll"
          cd "$DIR"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "docs: publish from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
