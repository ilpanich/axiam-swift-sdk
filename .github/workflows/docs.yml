name: docs

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: true

jobs:
  docc:
    name: build & publish DocC HTML to gh-pages
    runs-on: ubuntu-24.04
    container: swift:5.10-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Generate DocC static site
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target AxiamSDK \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path axiam-swift-sdk \
            --output-path ./docs

      - name: Add theme settings and landing-page redirect
        shell: bash
        run: |
          set -euo pipefail
          # swift-docc-render fetches "<base>/theme-settings.json" on every page
          # load. DocC does not emit one unless the catalog supplies it, so on
          # GitHub Pages that request returns a 404 HTML page instead of JSON,
          # which surfaces in the console as a broken theme. Publish a minimal
          # valid file so the request resolves to 200 JSON and the default theme
          # applies cleanly.
          cat > ./docs/theme-settings.json <<'EOF'
          {
            "features": {
              "docs": {
                "quickNavigation": { "enable": true }
              }
            }
          }
          EOF

          # DocC's root index.html is the render-app shell with no route, so the
          # bare Pages URL (https://ilpanich.github.io/axiam-swift-sdk/) loads a
          # blank page. Replace it with a redirect to the module's documentation
          # root so the site actually opens. Deep links keep their own shells.
          target="documentation/axiamsdk/"
          cat > ./docs/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>AxiamSDK Documentation</title>
              <meta http-equiv="refresh" content="0; url=${target}">
              <link rel="canonical" href="${target}">
              <script>location.replace("${target}" + location.hash);</script>
            </head>
            <body>
              <p>Redirecting to <a href="${target}">the AxiamSDK documentation</a>&hellip;</p>
            </body>
          </html>
          EOF
      - name: Publish to gh-pages
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DIR=docs
          touch "$DIR/.nojekyll"
          cd "$DIR"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "docs: publish from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
